[package]
name = "keystonelight"
version = "0.1.0"
edition = "2021"
description = "A lightweight key-value store with support for nested objects and multiple data types"
authors = ["Andrew Dong <andrewdong1994@gmail.com>"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
thiserror = "1.0"

[dev-dependencies]
tempfile = "3.8"
